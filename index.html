<!DOCTYPE html>
<html>

<title>AH Accessories Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(135deg,#0f172a,#7e22ce);
color:white;
padding:60px 20px;
text-align:center;
}

header h1{

}

header p{

.sale{

padding:10px 20px;

.product{

width:250px;

}

.old{
text-decoration:line-through;

.new{
color:red;
font-size:40px;
font-weight:bold;
}

.btn{

margin-top:20px;
background:#22c55e;
color:white;
padding:15px 25px;
text-decoration:none;
border-radius:10px;
font-size:20px;
}

.features{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.box{
background:#eee;
padding:15px;
border-radius:10px;
